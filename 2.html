<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xerxès</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0a0a0a;
      --white: #f5f2ec;
      --gold: #c9a96e;
      --gold-light: #e8d5b0;
      --grey: #6b6b6b;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      letter-spacing: 0.08em;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.4;
    }

    /* ─── INTRO ─── */
    #intro {
      position: fixed;
      inset: 0;
      background: var(--black);
      z-index: 8000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      pointer-events: none;
    }
    #intro.out {
      animation: introOut 0.8s ease forwards;
    }
    @keyframes introOut {
      0%   { opacity: 1; }
      70%  { opacity: 0; }
      100% { opacity: 0; visibility: hidden; }
    }
    .intro-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(52px, 10vw, 100px);
      font-weight: 300;
      letter-spacing: 0.45em;
      color: var(--white);
      opacity: 0;
      animation: fadeInLogo 1.4s ease 0.3s forwards;
    }
    .intro-line-gold {
      width: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      animation: expandLine 1s ease 1s forwards;
    }
    .intro-tagline {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(13px, 2vw, 17px);
      font-style: italic;
      font-weight: 300;
      letter-spacing: 0.25em;
      color: var(--gold-light);
      opacity: 0;
      animation: fadeInLogo 1s ease 1.8s forwards;
    }
    @keyframes fadeInLogo {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes expandLine {
      from { width: 0; opacity: 0; }
      to   { width: 120px; opacity: 0.6; }
    }

    /* ─── NAVBAR ─── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 48px;
      transition: background 0.4s ease;
    }
    nav.scrolled {
      background: rgba(10,10,10,0.88);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(201,169,110,0.12);
    }
    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px;
      font-weight: 300;
      letter-spacing: 0.38em;
      color: var(--white);
      cursor: pointer;
      transition: opacity 0.3s ease;
    }
    .nav-logo:hover { opacity: 0.7; }

    .top-line {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: 0.5;
      z-index: 501;
    }

    /* ─── PAGE TRANSITION ─── */
    #app { transition: opacity 0.35s ease; }
    #app.fade-out { opacity: 0; }

    /* ─── HERO ─── */
    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .video-placeholder {
      position: absolute;
      inset: 0;
      background: var(--black);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .video-placeholder-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      opacity: 0.2;
    }
    .video-icon {
      width: 52px; height: 52px;
      border-radius: 50%;
      border: 1px solid var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .video-icon::after {
      content: '';
      width: 0; height: 0;
      border-style: solid;
      border-width: 8px 0 8px 14px;
      border-color: transparent transparent transparent var(--gold);
      margin-left: 3px;
    }
    .video-label {
      font-size: 8px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold);
    }
    .hero::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 220px;
      background: linear-gradient(to bottom, transparent, var(--black));
      pointer-events: none;
    }
    .scroll-hint {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      z-index: 10;
    }
    .scroll-hint-text {
      font-size: 8px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--grey);
    }
    .scroll-line {
      width: 1px; height: 40px;
      background: linear-gradient(to bottom, var(--gold), transparent);
      animation: scrollPulse 2s ease-in-out infinite;
    }
    @keyframes scrollPulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.9; }
    }

    /* ─── SPLIT ─── */
    .split-wrap { position: relative; width: 100%; }
    .split {
      display: flex;
      width: 100%;
      height: 100vh;
    }
    .split-divider {
      position: absolute;
      left: 50%;
      top: 0; bottom: 0;
      width: 1px;
      background: linear-gradient(to bottom, transparent 5%, rgba(201,169,110,0.35) 30%, rgba(201,169,110,0.6) 50%, rgba(201,169,110,0.35) 70%, transparent 95%);
      z-index: 10;
      pointer-events: none;
      transform: translateX(-50%);
      transition: box-shadow 0.4s ease;
    }
    .split:hover .split-divider {
      background: linear-gradient(to bottom, transparent 5%, rgba(201,169,110,0.5) 30%, rgba(201,169,110,0.9) 50%, rgba(201,169,110,0.5) 70%, transparent 95%);
      box-shadow: 0 0 12px rgba(201,169,110,0.3);
    }

    .split-panel {
      position: relative;
      flex: 1;
      overflow: hidden;
      cursor: pointer;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 72px;
      transition: flex 0.6s cubic-bezier(0.4,0,0.2,1);
    }
    .split:hover .split-panel:hover { flex: 1.06; }
    .split:hover .split-panel:not(:hover) { flex: 0.94; }
    .split-panel.femme { background: #100f0f; }
    .split-panel.homme { background: #0e0e0e; }

    .panel-img-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .panel-img-placeholder svg { opacity: 0.05; width: 130px; }
    .panel-img-placeholder img {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center;
      transition: transform 0.8s cubic-bezier(0.4,0,0.2,1);
    }
    .split-panel:hover .panel-img-placeholder img { transform: scale(1.04); }

    .panel-overlay {
      position: absolute; inset: 0;
      background: rgba(201,169,110,0.04);
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    .split-panel:hover .panel-overlay { opacity: 1; }

    .panel-gradient {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 65%;
      background: linear-gradient(to top, rgba(10,10,10,0.92), transparent);
      z-index: 1;
    }
    .panel-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    .panel-eyebrow {
      font-size: 8px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.65;
      margin-bottom: 14px;
      transition: opacity 0.3s ease;
    }
    .split-panel:hover .panel-eyebrow { opacity: 1; }
    .panel-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(36px, 5vw, 64px);
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .panel-cta {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 9px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .split-panel:hover .panel-cta { opacity: 1; transform: translateY(0); }
    .cta-line { width: 24px; height: 1px; background: var(--gold); }

    /* ─── MANIFESTE ─── */
    .manifeste {
      padding: 120px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      position: relative;
    }
    .manifeste::before {
      content: '';
      position: absolute;
      top: 0; left: 50%; transform: translateX(-50%);
      width: 1px; height: 60px;
      background: linear-gradient(to bottom, rgba(201,169,110,0.5), transparent);
    }
    .manifeste-label {
      font-size: 8px;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.6;
      margin-bottom: 40px;
    }
    .manifeste-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(18px, 3vw, 26px);
      font-style: italic;
      font-weight: 300;
      letter-spacing: 0.08em;
      line-height: 1.8;
      color: var(--white);
      max-width: 680px;
      opacity: 0.85;
    }
    .manifeste-text em {
      color: var(--gold-light);
      font-style: normal;
    }

    /* ─── HISTOIRE ─── */
    .histoire {
      max-width: 620px;
      margin: 0 auto 72px;
      text-align: center;
    }
    .histoire-body {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(15px, 2vw, 18px);
      font-weight: 300;
      font-style: italic;
      line-height: 1.9;
      letter-spacing: 0.04em;
      color: var(--white);
      opacity: 0.78;
    }
    .histoire-body + .histoire-body {
      margin-top: 20px;
    }

    /* ─── CITATION HISTORIQUE ─── */
    .citation-historique {
      margin-top: 72px;
      padding-top: 56px;
      border-top: 1px solid rgba(201,169,110,0.15);
      max-width: 580px;
      text-align: center;
    }
    .citation-historique blockquote {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(16px, 2vw, 22px);
      font-style: italic;
      font-weight: 300;
      line-height: 1.85;
      letter-spacing: 0.05em;
      color: var(--gold-light);
      opacity: 0.88;
      margin-bottom: 20px;
    }
    .citation-source {
      font-size: 8px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.45;
    }

    /* ─── ABOUT PILLARS ─── */
    .about-pillars {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      margin-bottom: 56px;
      flex-wrap: wrap;
    }

    .pillar {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 0 40px;
    }

    .pillar-label {
      font-size: 7px;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.55;
    }

    .pillar-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 16px;
      font-weight: 300;
      letter-spacing: 0.15em;
      color: var(--white);
      opacity: 0.85;
    }

    .pillar-sep {
      width: 1px;
      height: 36px;
      background: rgba(201, 169, 110, 0.2);
    }

    .about-divider {
      width: 40px;
      height: 1px;
      background: rgba(201, 169, 110, 0.35);
      margin: 48px auto;
    }

    .about-body {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(15px, 2.2vw, 19px);
      font-weight: 300;
      line-height: 1.85;
      letter-spacing: 0.04em;
      color: var(--white);
      max-width: 620px;
      opacity: 0.78;
      margin-bottom: 20px;
    }

    .about-body--indent {
      opacity: 0.65;
      font-size: clamp(14px, 2vw, 17px);
      padding: 0 12px;
      border-left: 1px solid rgba(201, 169, 110, 0.2);
      text-align: left;
    }

    /* ─── MODÈLES BAGUES ─── */
    .modeles-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
      width: 100%;
      max-width: 860px;
      margin: 0 auto 72px;
    }
    .modele-card {
      position: relative;
      background: #0e0e0e;
      cursor: pointer;
      padding: 0;
      overflow: hidden;
      transition: background 0.4s ease;
    }
    .modele-card.active {
      background: #131313;
    }
    .modele-card::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    .modele-card.active::after,
    .modele-card:hover::after {
      opacity: 0.5;
    }

    .modele-visual {
      width: 100%;
      aspect-ratio: 1 / 1.1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }
    .modele-visual svg {
      width: 100%;
      max-width: 140px;
      height: auto;
      transition: transform 0.5s cubic-bezier(0.4,0,0.2,1);
    }
    .modele-card:hover .modele-visual svg {
      transform: scale(1.04);
    }

    .modele-info {
      padding: 20px 24px 28px;
      border-top: 1px solid rgba(201,169,110,0.08);
    }
    .modele-nom {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 300;
      letter-spacing: 0.18em;
      color: var(--white);
      margin-bottom: 6px;
    }
    .modele-desc {
      font-size: 7.5px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--grey);
      margin-bottom: 20px;
      line-height: 1.6;
    }

    /* ─── SWATCHES ─── */
    .swatches {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .swatch {
      width: 16px; height: 16px;
      border-radius: 50%;
      cursor: pointer;
      position: relative;
      transition: transform 0.2s ease;
      border: 1.5px solid transparent;
    }
    .swatch:hover { transform: scale(1.15); }
    .swatch.selected {
      border-color: rgba(201,169,110,0.7);
      transform: scale(1.15);
    }
    .swatch::after {
      content: '';
      position: absolute;
      inset: 2px;
      border-radius: 50%;
    }
    .swatch-or {
      background: radial-gradient(circle at 35% 35%, #f5d78e, #c9a96e 55%, #8a6a30);
    }
    .swatch-rose {
      background: radial-gradient(circle at 35% 35%, #f4c5b0, #c9836a 55%, #8a4a35);
    }
    .swatch-argent {
      background: radial-gradient(circle at 35% 35%, #f0f0f0, #c8c8c8 55%, #888888);
    }
    .swatch-label {
      font-size: 7px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--grey);
      margin-left: 4px;
      transition: color 0.2s ease;
    }

    .swatch-bleu {
      background: radial-gradient(circle at 35% 35%, #7ba7d4, #3a6fa8 55%, #1a3a60);
    }
    .swatch-vert {
      background: radial-gradient(circle at 35% 35%, #7db88a, #3d7a50 55%, #1a4028);
    }
    .swatch-bordeaux {
      background: radial-gradient(circle at 35% 35%, #c47a8a, #8b2a42 55%, #4a0f1e);
    }

    /* ─── COLLECTION VIEW ─── */
    .collection-view {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 120px 24px 80px;
    }
    .collection-eyebrow {
      font-size: 8px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.7;
      margin-bottom: 20px;
    }
    .collection-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(52px, 9vw, 100px);
      font-weight: 300;
      letter-spacing: 0.2em;
      margin-bottom: 32px;
    }
    .collection-divider {
      width: 40px; height: 1px;
      background: var(--gold);
      margin: 0 auto 48px;
      opacity: 0.5;
    }

    /* ─── LISTE PRIVÉE ─── */
    .liste-privee {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      padding: 48px 32px;
      border: 1px solid rgba(201,169,110,0.15);
      position: relative;
    }
    .liste-privee::before {
      content: '';
      position: absolute;
      top: -1px; left: 50%; transform: translateX(-50%);
      width: 40px; height: 1px;
      background: var(--gold);
      opacity: 0.6;
    }

    .liste-tag {
      font-size: 7px;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.7;
      margin-bottom: 16px;
      display: block;
    }

    .liste-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 300;
      letter-spacing: 0.15em;
      margin-bottom: 12px;
      color: var(--white);
    }

    /* ─── COMPTEUR ─── */
    .compteur {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 32px;
    }
    .compteur-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--gold);
      animation: pulse-dot 2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.3); }
    }
    .compteur-text {
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold-light);
    }
    .compteur-number {
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px;
      color: var(--gold);
      font-weight: 400;
    }

    /* ─── FORM ─── */
    .liste-form {
      display: flex;
      flex-direction: column;
      gap: 0;
      width: 100%;
    }
    .liste-input-wrap {
      display: flex;
      border-bottom: 1px solid rgba(201,169,110,0.3);
      transition: border-color 0.3s ease;
      margin-bottom: 20px;
    }
    .liste-input-wrap:focus-within {
      border-color: var(--gold);
    }
    .liste-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--white);
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.15em;
      padding: 12px 0;
    }
    .liste-input::placeholder { color: var(--grey); letter-spacing: 0.15em; }

    .liste-btn {
      background: transparent;
      border: 1px solid rgba(201,169,110,0.4);
      color: var(--gold);
      font-family: 'Montserrat', sans-serif;
      font-size: 8px;
      font-weight: 400;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 14px 24px;
      transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
      width: 100%;
    }
    .liste-btn:hover {
      background: rgba(201,169,110,0.08);
      border-color: var(--gold);
    }

    .liste-success {
      display: none;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 14px;
      letter-spacing: 0.1em;
      color: var(--gold-light);
      text-align: center;
      margin-top: 16px;
      opacity: 0.8;
    }

    .back-btn {
      margin-top: 64px;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-size: 9px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--grey);
      background: none;
      border: none;
      cursor: pointer;
      transition: color 0.3s ease;
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
    }
    .back-btn:hover { color: var(--gold); }
    .back-line { width: 24px; height: 1px; background: currentColor; }

    /* ─── FICHE PRODUIT ─── */
    .fiche-view {
      min-height: 100vh;
      padding: 100px 48px 100px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .fiche-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: start;
    }

    </div>
    <div class="footer-bottom">
      <span class="footer-copy">© 2025 Xerxès — Tous droits réservés</span>
      <span class="footer-copy">Genève, Suisse</span>
    </div>
  </footer>

  <script>
    const app = document.getElementById('app');
    const navbar = document.getElementById('navbar');
    const intro = document.getElementById('intro');
    let currentView = 'home';

    // Compteurs statiques — à connecter à une API plus tard
    const PLACES = { bagues: 23, bracelets: 17 };

    // ─── INTRO ───
    setTimeout(() => {
      intro.classList.add('out');
      setTimeout(() => { intro.style.display = 'none'; }, 900);
    }, 3000);

    // ─── SCROLL ───
    window.addEventListener('scroll', () => {
      if (currentView === 'home') {
        navbar.classList.toggle('scrolled', window.scrollY > 60);
      }
    });

    // ─── NAVIGATION ───
    function navigate(view) {
      if (view === currentView) return;
      app.classList.add('fade-out');
      setTimeout(() => {
        currentView = view;
        render(view);
        app.classList.remove('fade-out');
        window.scrollTo(0, 0);
        navbar.classList.toggle('scrolled', view !== 'home');
      }, 350);
    }

    function render(view) {
      if (view === 'home') renderHome();
      else if (view === 'bagues') renderCollection('bagues');
      else if (view === 'bracelets') renderCollection('bracelets');
      else if (view.startsWith('fiche-')) renderFiche(view.replace('fiche-', ''));
      else if (view === 'contact') renderContact();
      else if (view === 'mentions') renderMentions();
    }

    function renderContact() {
      app.innerHTML = `
        <div class="back-arrow" onclick="navigate('home')">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M19 12H5M5 12L12 19M5 12L12 5" stroke="#c9a96e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="back-arrow-label">Accueil</span>
        </div>
        <div class="contact-view animate-in">
          <span class="contact-eyebrow">Nous écrire</span>
          <h1 class="contact-title">Contact</h1>
          <p class="contact-subtitle">Une question sur une pièce, une commande,<br>ou simplement envie d\u2019en savoir plus.</p>
          <form class="contact-form" onsubmit="handleContact(event)">
            <input type="text" class="contact-input" placeholder="Votre nom" required/>
            <input type="email" class="contact-input" placeholder="Votre adresse email" required/>
            <textarea class="contact-input contact-textarea" placeholder="Votre message"></textarea>
            <button type="submit" class="contact-btn">Envoyer</button>
          </form>
          <p class="contact-email-alt">Ou directement par email : <a href="mailto:contact@xerxes.com">contact@xerxes.com</a></p>
        </div>
      `;
    }

    function renderMentions() {
      app.innerHTML = `
        <div class="back-arrow" onclick="navigate('home')">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">

          <h1 class="mentions-title">Mentions légales</h1>

          <div class="mentions-section">

          <div class="mentions-section">
            <span class="mentions-section-title">Politique de confidentialité</span>
            <p class="mentions-body">Les informations collectées via ce site sont utilisées uniquement dans le cadre de la relation commerciale. Elles ne sont jamais transmises à des tiers. Conformément au RGPD, vous disposez d\u2019un droit d\u2019accès, de rectification et de suppression de vos données.</p>
          </div>

          </div>
        </div>
      `;
    }

    function handleContact(e) {
      e.preventDefault();
      e.target.innerHTML = '<p style="font-family:\'Cormorant Garamond\',serif; font-size:18px; font-style:italic; color:var(--gold-light); opacity:0.7; text-align:center; padding:20px 0;">Message envoyé. Nous vous répondrons sous 48h.</p>';

    function handleNewsletter() {
      const input = document.getElementById('nl-input');
      const success = document.getElementById('nl-success');
      if (input && input.value.includes('@')) {
        input.parentElement.style.opacity = '0.3';
        input.parentElement.style.pointerEvents = 'none';
        success.classList.add('visible');

    }

    // ─── HOME ───
    function renderHome() {
      app.innerHTML = `
        <section class="hero">

          <!-- ACHILLE -->
          <div class="modele-card" id="card-1" onclick="navigate('fiche-achille')" style="cursor:pointer">

                  <linearGradient id="g-br-1" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#7ba7d4"/>
                    <stop offset="50%" stop-color="#3a6fa8"/>
                    <stop offset="100%" stop-color="#1a3a60"/>
                  </linearGradient>
                </defs>
                <rect x="18" y="65" width="104" height="10" rx="5" fill="url(#g-br-1)" opacity="0.88"/>
                <line x1="18" y1="70" x2="122" y2="70" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
                <circle cx="114" cy="70" r="7" fill="url(#g-br-1)" stroke="rgba(255,255,255,0.13)" stroke-width="1"/>

            </div>
            <div class="modele-info">
              <p class="modele-nom">Achille</p>
              <p class="modele-desc">Corde de soie tressée<br>Discret, tendu</p>
              <div class="swatches">
                <div class="swatch swatch-bleu selected" onclick="selectSwatchBr(event, 1, 'bleu')" title="Bleu nuit"></div>
                <div class="swatch swatch-vert" onclick="selectSwatchBr(event, 1, 'vert')" title="Vert forêt"></div>
                <div class="swatch swatch-bordeaux" onclick="selectSwatchBr(event, 1, 'bordeaux')" title="Bordeaux"></div>
                <span class="swatch-label" id="swatch-label-1">Bleu nuit</span>

          <!-- HÉRACLÈS -->
          <div class="modele-card" id="card-2" onclick="navigate('fiche-heracles')" style="cursor:pointer">
            <div class="modele-visual">
              <svg viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg">
                <defs>
                  <linearGradient id="g-br-2" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#7ba7d4"/>
                    <stop offset="50%" stop-color="#3a6fa8"/>
                    <stop offset="100%" stop-color="#1a3a60"/>
                  </linearGradient>
                </defs>
                ${[0,1,2,3,4].map(i => `<rect x="${20+i*22}" y="62" width="15" height="18" rx="3" fill="none" stroke="url(#g-br-2)" stroke-width="2" opacity="0.88"/>`).join('')}
                <circle cx="116" cy="71" r="6" fill="url(#g-br-2)" opacity="0.9"/>
              </svg>
            </div>
            <div class="modele-info">
              <p class="modele-nom">Héraclès</p>
              <p class="modele-desc">Mailles milanaises<br>Structuré, solide</p>
              <div class="swatches">
                <div class="swatch swatch-bleu selected" onclick="selectSwatchBr(event, 2, 'bleu')" title="Bleu nuit"></div>
                <div class="swatch swatch-vert" onclick="selectSwatchBr(event, 2, 'vert')" title="Vert forêt"></div>
                <div class="swatch swatch-bordeaux" onclick="selectSwatchBr(event, 2, 'bordeaux')" title="Bordeaux"></div>
                <span class="swatch-label" id="swatch-label-2">Bleu nuit</span>
              </div>
            </div>
          </div>

        </div>
      `;

      app.innerHTML = `
        <div class="collection-view animate-in">
          <p class="collection-eyebrow">Collection ${label}</p>
          <h1 class="collection-title">${titre}</h1>
          <div class="collection-divider"></div>

          ${modeles}

          <div class="liste-privee">
            <span class="liste-tag">Accès privé</span>
            <h3 class="liste-title">Rejoindre la liste privée</h3>

            <div class="compteur">
              <div class="compteur-dot"></div>
              <span class="compteur-text">
                <span class="compteur-number" id="${countId}">${places}</span>
                &nbsp;places restantes
              </span>
            </div>

            <form class="liste-form" id="${formId}" onsubmit="handleJoin(event, '${type}')">
              <div class="liste-input-wrap">
                <input
                  type="email"
                  class="liste-input"
                  placeholder="votre adresse email"
                  required
                />
              </div>
              <button type="submit" class="liste-btn">Rejoindre — ${prochain}</button>
            </form>

            <p class="liste-success" id="${successId}">
              Vous êtes sur la liste. Nous vous contacterons en premier.
            </p>
          </div>

          <button class="back-btn" onclick="navigate('home')">
            <div class="back-line"></div>
            Retour
          </button>
        </div>
      `;
    }

    // ─── DONNÉES MODÈLES ───
    const MODELES = {
      // ── BAGUES ──
      aphrodite: {
        genre: 'bagues',
        collection: 'Femme',
        type: 'bague',
        nom: 'Aphrodite',
        intention: 'La plus ancienne des forces. Un trait qui tourne, sans début ni fin. Aphrodite ne cherche pas à s\u2019imposer, elle s\u2019impose.',
        materiaux: [
          { label: 'Métal', valeur: 'Or 18 carats' },
          { label: 'Finition', valeur: 'Polie miroir' },
          { label: 'Épaisseur', valeur: '1,8 mm' },
          { label: 'Poids', valeur: '3,2 g' },
        ],
        tailles: ['48','50','52','54','56','58'],
        edition: '— / 50',
        svgStroke: 9,
        svgType: 'ring',
      },
      gaia: {
        genre: 'bagues',
        collection: 'Femme',
        type: 'bague',
        nom: 'Gaïa',
        intention: 'Large, présente, affirmée. Gaïa est la bague de celles qui n\u2019ont pas besoin d\u2019explications. Elle parle avant vous.',
        materiaux: [
          { label: 'Métal', valeur: 'Or 18 carats' },
          { label: 'Finition', valeur: 'Brossée mate' },
          { label: 'Épaisseur', valeur: '4 mm' },
          { label: 'Poids', valeur: '6,8 g' },
        ],
        tailles: ['48','50','52','54','56','58'],
        edition: '— / 50',
        svgStroke: 16,
        svgType: 'ring',
      },
      eos: {
        genre: 'bagues',
        collection: 'Femme',
        type: 'bague',
        nom: 'Éos',
        intention: 'Déesse de l\u2019aurore, elle précède la lumière. Éos est la bague de celles qui annoncent ce qui vient, et le portent avant les autres.',
        materiaux: [
          { label: 'Métal', valeur: 'Or 18 carats' },
          { label: 'Finition', valeur: 'Biseautée, poli miroir' },
          { label: 'Épaisseur', valeur: '3 mm' },
          { label: 'Poids', valeur: '5,1 g' },
        ],
        tailles: ['48','50','52','54','56','58'],
        edition: '— / 50',
        svgStroke: 12,
        svgType: 'ring-beveled',
      },
      // ── BRACELETS ──
      cephale: {
        genre: 'bracelets',
        collection: 'Homme',
        type: 'bracelet',
        nom: 'Céphale',
        intention: 'Chasseur infatigable, époux fidèle. Céphale est le bracelet de ceux qui avancent sans regarder derrière, portant leurs engagements comme une armure légère.',
        materiaux: [
          { label: 'Matière', valeur: 'Cuir de veau pleine fleur' },
          { label: 'Fermoir', valeur: 'Acier inoxydable 316L' },
          { label: 'Largeur', valeur: '12 mm' },
          { label: 'Longueur', valeur: '19 cm ajustable' },
        ],
        tailles: ['S','M','L','XL'],
        edition: '— / 50',
        svgStroke: 0,
        svgType: 'bracelet-thin',
      },
      achille: {
        genre: 'bracelets',
        collection: 'Homme',
        type: 'bracelet',
        nom: 'Achille',
        intention: 'Le plus grand des guerriers, invincible sauf en un point. Achille rappelle que la force n\u2019exclut pas la vulnérabilité, elle la sublime.',
        materiaux: [
          { label: 'Matière', valeur: 'Corde de soie tressée' },
          { label: 'Fermoir', valeur: 'Or vermeil 18 carats' },
          { label: 'Largeur', valeur: '8 mm' },
          { label: 'Longueur', valeur: '18,5 cm ajustable' },
        ],
        tailles: ['S','M','L','XL'],
        edition: '— / 50',
        svgStroke: 0,
        svgType: 'bracelet-cord',
      },
      heracles: {
        genre: 'bracelets',
        collection: 'Homme',
        type: 'bracelet',
        nom: 'Héraclès',
        intention: 'Douze travaux, une seule volonté. Héraclès est le bracelet des épreuves traversées, de ce qu\u2019on ne montre pas mais qu\u2019on porte.',
        materiaux: [
          { label: 'Matière', valeur: 'Mailles d\u2019acier milanais' },
          { label: 'Fermoir', valeur: 'Magnétique, acier brossé' },
          { label: 'Largeur', valeur: '6 mm' },
          { label: 'Longueur', valeur: '20 cm ajustable' },
        ],
        tailles: ['S','M','L','XL'],
        edition: '— / 50',
        svgStroke: 0,
        svgType: 'bracelet-chain',
      },
    };

    // ─── FICHE PRODUIT ───
    function renderFiche(slug) {
      const m = MODELES[slug];
      if (!m) { navigate('bagues'); return; }

      const isBracelet = m.svgType.startsWith('bracelet');
      const defaultColoris = isBracelet ? 'bleu' : 'or';
      const firstColoris = COLORIS_MAP[m.genre][defaultColoris];
      const svgGradId = 'g-fiche';

      function buildSVG(gradId) {
        if (m.svgType === 'ring') return `
          <ellipse cx="100" cy="105" rx="64" ry="21" fill="none" stroke="url(#${gradId})" stroke-width="${m.svgStroke}" opacity="0.93"/>
          <ellipse cx="100" cy="105" rx="64" ry="21" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>`;
        if (m.svgType === 'ring-beveled') return `
          <ellipse cx="100" cy="105" rx="64" ry="21" fill="none" stroke="url(#${gradId})" stroke-width="${m.svgStroke}" opacity="0.9"/>
          <ellipse cx="100" cy="105" rx="54" ry="15" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
          <ellipse cx="100" cy="105" rx="74" ry="26" fill="none" stroke="rgba(201,169,110,0.25)" stroke-width="1"/>`;
        if (m.svgType === 'bracelet-thin') return `
          <rect x="30" y="88" width="140" height="24" rx="12" fill="url(#${gradId})" opacity="0.9"/>
          <rect x="30" y="88" width="140" height="24" rx="12" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>`;
        if (m.svgType === 'bracelet-cord') return `
          <rect x="30" y="93" width="140" height="14" rx="7" fill="url(#${gradId})" opacity="0.85"/>
          <line x1="30" y1="100" x2="170" y2="100" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
          <circle cx="162" cy="100" r="9" fill="url(#${gradId})" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>`;
        if (m.svgType === 'bracelet-chain') return `
          ${[0,1,2,3,4,5,6].map(i => `<rect x="${32+i*20}" y="91" width="14" height="18" rx="4" fill="none" stroke="url(#${gradId})" stroke-width="2.5" opacity="0.9"/>`).join('')}
          <circle cx="162" cy="100" r="8" fill="url(#${gradId})" opacity="0.9"/>`;
        return '';
      }

      const swatchKeys = Object.keys(COLORIS_MAP[m.genre]);
      const swatchesHTML = swatchKeys.map(key => {
        const c = COLORIS_MAP[m.genre][key];
        const isDefault = key === defaultColoris;
        return `<div class="fiche-swatch${isDefault?' selected':''}" style="background:${c.swatch}" onclick="ficheSelectSwatch(event,'${key}','${m.genre}')" title="${c.label}"></div>`;
      }).join('');

      app.innerHTML = `
        <div class="back-arrow" onclick="navigate('${m.genre}')">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M19 12H5M5 12L12 19M5 12L12 5" stroke="#c9a96e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="back-arrow-label">${m.collection === 'Femme' ? 'Bagues' : 'Bracelets'}</span>
        </div>
        <div class="fiche-view animate-in">
          <div class="fiche-grid">

            <!-- VISUEL -->
            <div class="fiche-visuel">
              <div class="fiche-img-wrap">
                <svg id="fiche-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                  <defs>
                    <linearGradient id="${svgGradId}" x1="0%" y1="0%" x2="100%" y2="0%">
                      <stop offset="0%" stop-color="${firstColoris.stops[0]}"/>
                      <stop offset="50%" stop-color="${firstColoris.stops[1]}"/>
                      <stop offset="100%" stop-color="${firstColoris.stops[2]}"/>
                    </linearGradient>
                  </defs>
                  ${buildSVG(svgGradId)}
                </svg>
              </div>

              <div class="fiche-swatches">
                ${swatchesHTML}
                <span class="fiche-swatch-label" id="fiche-coloris-label">${firstColoris.label}</span>
              </div>
            </div>

            <!-- INFOS -->
            <div class="fiche-infos">
              <span class="fiche-eyebrow">Collection ${m.collection}</span>
              <h1 class="fiche-nom">${m.nom}</h1>
              <span class="fiche-coloris-actif" id="fiche-coloris-actif">${firstColoris.label}</span>

              <div class="fiche-divider"></div>

              <p class="fiche-intention">${m.intention}</p>

              <span class="fiche-section-label">Matériaux</span>
              <ul class="fiche-materiaux">
                ${m.materiaux.map(mat => `<li>${mat.label}<span>${mat.valeur}</span></li>`).join('')}
              </ul>

              <span class="fiche-section-label">Édition numérotée</span>
              <div class="fiche-edition">
                <p class="fiche-edition-num">Pièce n° ${m.edition}</p>
              </div>

              <span class="fiche-section-label">${isBracelet ? 'Tour de poignet' : 'Taille (diamètre intérieur)'}</span>
              <div class="fiche-tailles">
                ${m.tailles.map((t,i) => `<div class="fiche-taille${i===1?' selected':''}" onclick="selectTaille(this)">${t}</div>`).join('')}
              </div>
              <span class="fiche-taille-hint">Guide des tailles →</span>

              <div class="fiche-duo">
                <div class="fiche-duo-line"></div>
                <p class="fiche-duo-text">${isBracelet
                  ? 'Ce bracelet a son pendant féminin.<br><strong>La bague Xerxès</strong> complète le duo.'
                  : 'Cette bague a son pendant masculin.<br><strong>Le bracelet Xerxès</strong> complète le duo.'
                }</p>
              </div>

              <!-- CTA ACHETER -->
              <div style="margin-bottom: 12px;">
                <span class="fiche-section-label">Prix</span>
                <p style="font-family:'Cormorant Garamond',serif; font-size:28px; font-weight:300; letter-spacing:0.1em; color:var(--white); margin-bottom:20px;">300 CHF</p>
              </div>
              <button class="fiche-cta" onclick="window.open('https://buy.stripe.com','_blank')">Acheter — 300 CHF</button>

            </div>

          </div>
        </div>
      `;
    }

    function ficheSelectSwatch(e, coloris, genre) {
      document.querySelectorAll('.fiche-swatch').forEach(s => s.classList.remove('selected'));
      e.target.classList.add('selected');
      const c = COLORIS_MAP[genre][coloris];
      document.getElementById('fiche-coloris-label').textContent = c.label;
      document.getElementById('fiche-coloris-actif').textContent = c.label;
      const grad = document.getElementById('g-fiche');
      if (grad) {
        grad.children[0].setAttribute('stop-color', c.stops[0]);
        grad.children[1].setAttribute('stop-color', c.stops[1]);
        grad.children[2].setAttribute('stop-color', c.stops[2]);
      }
    }

    function selectTaille(el) {
      document.querySelectorAll('.fiche-taille').forEach(t => t.classList.remove('selected'));
      el.classList.add('selected');
    }

    // ─── INSCRIPTION ───
    function handleJoin(e, type) {
      e.preventDefault();
      const form = e.target;
      const successEl = document.getElementById('success-' + type);
      const countEl = document.getElementById('count-' + type);

      // Décrémenter localement
      const current = parseInt(countEl.textContent);
      if (current > 1) countEl.textContent = current - 1;

      // Masquer le form, afficher le message
      form.style.opacity = '0.3';
      form.style.pointerEvents = 'none';
      successEl.style.display = 'block';

      // Ici plus tard : fetch('/api/subscribe', { method:'POST', body: ... })
    }

    // ─── SWATCH INTERACTION ───
    const COLORIS = {
      'or':     { label: 'Or jaune',  stops: ['#f5d78e','#c9a96e','#7a5c28'] },
      'rose':   { label: 'Or rose',   stops: ['#f4c5b0','#c9836a','#7a3a20'] },
      'argent': { label: 'Argent',    stops: ['#f0f0f0','#c8c8c8','#888888'] },
    };

    const COLORIS_MAP = {
      bagues: {
        or:     { label: 'Or jaune',  stops: ['#f5d78e','#c9a96e','#7a5c28'], swatch: 'radial-gradient(circle at 35% 35%, #f5d78e, #c9a96e 55%, #7a5c28)' },
        rose:   { label: 'Or rose',   stops: ['#f4c5b0','#c9836a','#7a3a20'], swatch: 'radial-gradient(circle at 35% 35%, #f4c5b0, #c9836a 55%, #7a3a20)' },
        argent: { label: 'Argent',    stops: ['#f0f0f0','#c8c8c8','#888888'], swatch: 'radial-gradient(circle at 35% 35%, #f0f0f0, #c8c8c8 55%, #888888)' },
      },
      bracelets: {
        bleu:    { label: 'Bleu nuit',  stops: ['#7ba7d4','#3a6fa8','#1a3a60'], swatch: 'radial-gradient(circle at 35% 35%, #7ba7d4, #3a6fa8 55%, #1a3a60)' },
        vert:    { label: 'Vert forêt', stops: ['#7db88a','#3d7a50','#1a4028'], swatch: 'radial-gradient(circle at 35% 35%, #7db88a, #3d7a50 55%, #1a4028)' },
        bordeaux:{ label: 'Bordeaux',   stops: ['#c47a8a','#8b2a42','#4a0f1e'], swatch: 'radial-gradient(circle at 35% 35%, #c47a8a, #8b2a42 55%, #4a0f1e)' },
      },
    };

    function selectSwatch(e, cardIndex, coloris) {
      e.stopPropagation();
      const card = document.getElementById('card-' + cardIndex);
      card.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
      e.target.classList.add('selected');
      document.getElementById('swatch-label-' + cardIndex).textContent = COLORIS[coloris].label;
      const stops = COLORIS[coloris].stops;
      const grad = document.getElementById('g-or-' + cardIndex);
      if (grad) {
        grad.children[0].setAttribute('stop-color', stops[0]);
        grad.children[1].setAttribute('stop-color', stops[1]);
        grad.children[2].setAttribute('stop-color', stops[2]);
      }
      document.querySelectorAll('.modele-card').forEach(c => c.classList.remove('active'));
      card.classList.add('active');
    }

    function selectSwatchBr(e, cardIndex, coloris) {
      e.stopPropagation();
      const card = document.getElementById('card-' + cardIndex);
      card.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
      e.target.classList.add('selected');
      const c = COLORIS_MAP.bracelets[coloris];
      document.getElementById('swatch-label-' + cardIndex).textContent = c.label;
      const grad = document.getElementById('g-br-' + cardIndex);
      if (grad) {
        grad.children[0].setAttribute('stop-color', c.stops[0]);
        grad.children[1].setAttribute('stop-color', c.stops[1]);
        grad.children[2].setAttribute('stop-color', c.stops[2]);
      }
      document.querySelectorAll('.modele-card').forEach(c => c.classList.remove('active'));
      card.classList.add('active');
    }

    render('home');
  </script>

</body>
</html>
